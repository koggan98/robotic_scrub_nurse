# ArUco Marker Configuration
# =============================
# Centralized config for all markers and static frames in the system.
# The aruco_marker_manager node loads this at startup.
#
# All frames are defined relative to `world` (the canonical reference frame
# used by MoveIt planning, hand_pose publishing, and tool poses throughout
# the system). world and base are related by a 180 deg rotation around Z:
#   world_X = -base_X,  world_Y = -base_Y,  world_Z = base_Z
#
# For each marker:
#   - Static TF (world -> child_frame) is published from this config
#   - Detection node subscribes to the listed camera, and on first valid
#     detection publishes a static TF (child_frame -> camera_output_frame).
#
# Orientation convention:
#   rotation_rpy is [roll, pitch, yaw] in radians, applied as
#   R = Rz(yaw) * Ry(pitch) * Rx(roll) (standard ROS tf2 convention).

# ArUco dictionary used for all markers (cv2.aruco.DICT_ARUCO_ORIGINAL)
dictionary: "original"

markers:

  # ─── Marker 100: Scene camera localization (mounted on MiR side) ──────
  - name: "mir_side_marker"
    id: 100
    size: 0.115
    static_pose:
      parent_frame: "world"
      child_frame: "aruco_marker_100_frame"
      # TODO: measure x in world frame
      # y = -0.44 in world (marker sits 44 cm along -y_world; = +y_base)
      # z = top_edge (-0.028) - size/2 (0.0575) = -0.0855  (center below base plane)
      translation: [0.0, -0.44, -0.0855]
      # Axis mapping (marker frame -> world frame):
      #   marker_X -> +world_X
      #   marker_Y -> +world_Z  (up)
      #   marker_Z -> -world_Y  (points away from robot)
      # Equivalent RPY in ROS convention: (roll=pi/2, pitch=0, yaw=0)
      rotation_rpy: [1.5707963267948966, 0.0, 0.0]
    detection:
      camera_namespace: "/scene_camera"
      camera_output_frame: "scene_camera_color_optical_frame"
      publish_once: true

  # ─── Marker 120: Tray camera localization (mounted on instrument tray) ──
  - name: "tray_marker"
    id: 120
    size: 0.080
    static_pose:
      parent_frame: "world"
      child_frame: "aruco_marker_120_frame"
      # TODO: measure actual position + orientation in world frame after tray is built
      translation: [-0.35, 0.12, 0.0]
      rotation_rpy: [0.0, 0.0, 3.141592653589793]
    detection:
      camera_namespace: "/tray_camera"
      camera_output_frame: "tray_camera_color_optical_frame"
      publish_once: true

# ─── Additional static frames (no detection, just fixed TFs) ─────────
static_frames:

  # Reclaim holder - new setup uses a fixed position, not derived from a marker
  - parent_frame: "world"
    child_frame: "tool_holder_frame"
    # TODO: measure reclaim-holder position in world frame
    translation: [0.0, 0.0, 0.0]
    rotation_rpy: [0.0, 0.0, 0.0]
